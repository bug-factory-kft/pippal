<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self';" />
  <title>PipPal</title>
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/surfaces.css" />
</head>
<body>
  <div id="root">
    <!-- Custom chromeless title bar.
         The icon + brand area carries .pywebview-drag-region so
         pywebview's cross-backend drag mechanism (EdgeChromium / GTK)
         works for settings/voices/etc. windows (easy_drag=False, so
         -webkit-app-region alone would not work on WebView2).
         .winbtn intentionally does NOT carry the class and is NOT a
         descendant of any .pywebview-drag-region node, so a click on
         the close button never triggers a window drag. -->
    <div class="titlebar" id="titlebar">
      <span class="titlebar-drag pywebview-drag-region">
        <img src="assets/pippal_icon.png" alt="" />
        <span class="brand" id="brand-name">PipPal</span>
      </span>
      <button class="winbtn close" id="btn-window-close" data-testid="window-close"
              title="Close" aria-label="Close">&#x2715;</button>
    </div>

    <!-- View container — one of the surfaces is rendered here by main.js -->
    <div class="scroll-body" id="view" data-testid="view"></div>

    <!-- Footer (Settings only) -->
    <div class="footer hidden" id="footer">
      <button id="btn-reset" data-testid="settings-reset">Reset to defaults</button>
      <span class="spacer"></span>
      <button id="btn-cancel" data-testid="settings-cancel">Cancel</button>
      <button id="btn-apply" data-testid="settings-apply">Apply</button>
      <button class="primary" id="btn-save" data-testid="settings-save">Save</button>
    </div>
  </div>

  <div class="toast" id="toast" data-testid="toast"></div>

  <!-- Confirm modal — restores the Tk messagebox.askyesno gate for
       destructive actions (voice Remove, Reset to defaults). Hidden
       until confirm() shows it; the action only runs on accept. -->
  <div class="modal-backdrop hidden" id="confirm-modal"
       data-testid="confirm-modal" role="dialog" aria-modal="true"
       aria-labelledby="confirm-title">
    <div class="modal">
      <div class="modal-title" id="confirm-title"
           data-testid="confirm-title"></div>
      <div class="modal-body" id="confirm-body"
           data-testid="confirm-body"></div>
      <div class="modal-actions">
        <button id="confirm-cancel" data-testid="confirm-cancel">No</button>
        <button class="danger" id="confirm-ok"
                data-testid="confirm-ok">Yes</button>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/pro_diag_instrument.js"></script>
  <script src="js/pro_bridge_resilient.js"></script>
  <script src="js/components.js"></script>
  <script src="js/main.js" type="module"></script>
</body>
</html>
