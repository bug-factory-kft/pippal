[pytest]
# Keep pytest configuration here only. If [tool.pytest.ini_options] is
# added to pyproject.toml while this file exists, pytest ignores it and
# emits a release-gate warning.
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
filterwarnings =
    ignore::DeprecationWarning
markers =
    e2e: end-to-end test that needs a real piper.exe + voice on disk
    e2e_asr: extra-heavy e2e step that runs faster-whisper on the synth output
# Benchmark and e2e suites are skipped by default so `python -m pytest`
# runs in seconds and stays deterministic. Run them explicitly:
#   pytest tests/benchmarks --benchmark-only
#   pytest tests/e2e -m e2e            (needs PIPPAL_PIPER_EXE etc.)
#   pytest tests/smoke                 (builds a wheel + clean venv)
#   pytest tests/ui_smokes             (drives Notepad/Edge; needs
#                                       PIPPAL_UI_SMOKES=1 on Windows,
#                                       see e2e/run-ui-smokes.ps1)
addopts = -ra --strict-markers --ignore=tests/benchmarks --ignore=tests/e2e --ignore=tests/smoke --ignore=tests/ui_smokes
