[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
filterwarnings =
    ignore::DeprecationWarning
# Benchmark suite under tests/benchmarks/ is skipped by default so
# `python -m pytest` runs in seconds and stays deterministic. Run
# benchmarks explicitly: `pytest tests/benchmarks --benchmark-only`.
addopts = -ra --strict-markers --ignore=tests/benchmarks
