name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write   # find-comment + create-or-update-comment

jobs:
  # ----- Lint -----------------------------------------------------------
  # Cheapest — runs in parallel with the other two so a typo gets
  # reported immediately while the test job is still pulling deps.
  lint:
    name: Lint
    runs-on: [self-hosted, windows, pippal-windows]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install ruff
        shell: pwsh
        run: python -m pip install --upgrade pip ruff
      - name: Run ruff
        shell: pwsh
        run: ruff check src/pippal tests

  # ----- Unit tests -----------------------------------------------------
  # 140 tests in tests/, benchmarks/ excluded by pytest.ini.
  unit-tests:
    name: Unit tests
    runs-on: [self-hosted, windows, pippal-windows]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install package + dev extras
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run unit suite
        id: unit
        # Tee-Object so we have the output for a possible failure comment
        # while pytest's own exit code still drives the job result.
        shell: pwsh
        run: |
          python -m pytest -q | Tee-Object -FilePath unit-output.txt

      # If unit tests failed, post a comment with the summary so the
      # reviewer can see what broke without hunting through the log.
      # Success doesn't get a comment (less noise; the green check is
      # enough).
      - name: Format unit failure comment
        if: failure() && github.event_name == 'pull_request'
        shell: pwsh
        run: |
          $sha = $env:GITHUB_SHA.Substring(0, 7)
          @(
            "### ❌ Unit tests failed — ``$sha``"
            ""
            "<details><summary>pytest output (tail)</summary>"
            ""
            '```'
            (Get-Content unit-output.txt -Tail 80 -ErrorAction SilentlyContinue)
            '```'
            ""
            "</details>"
          ) | Out-File -FilePath unit-comment.md -Encoding utf8

      - name: Find prior unit comment
        if: failure() && github.event_name == 'pull_request'
        id: find-unit
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: "❌ Unit tests"

      - name: Comment unit failure on PR
        if: failure() && github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find-unit.outputs.comment-id }}
          body-path: unit-comment.md
          edit-mode: replace

  # ----- Benchmarks -----------------------------------------------------
  # 35 microbenchmarks across hotkey / text_utils / voices / plugins / io.
  # Always posts a comment on PRs so reviewers can compare numbers
  # against the baseline they remember from the previous PR.
  benchmarks:
    name: Benchmarks
    runs-on: [self-hosted, windows, pippal-windows]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install package + dev extras
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      # If a baseline is committed under `bench-baselines/`, compare
      # against it and fail the job when any benchmark's mean is
      # >30 % slower. The baseline is regenerated by the
      # `Update benchmark baseline` workflow (manual dispatch) when
      # an intentional perf change lands.
      #
      # If no baseline exists in the repo yet, the comparison flags
      # are skipped — we just print the numbers.
      - name: Run benchmarks
        shell: pwsh
        run: |
          $baselineFile = Get-ChildItem -Path bench-baselines -Filter '0001_baseline.json' -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          $compareFlags = @()
          if ($baselineFile) {
            $baseName = $baselineFile.BaseName -replace '_[^_]+$', ''
            Write-Host "Baseline found at $($baselineFile.FullName) — comparing with min:100% regression threshold."
            $compareFlags = @(
              "--benchmark-storage=file://bench-baselines",
              "--benchmark-compare=$baseName",
              "--benchmark-compare-fail=min:100%"
            )
          } else {
            Write-Host "No baseline in bench-baselines/. Run the 'Update benchmark baseline' workflow once to seed it."
          }
          python -m pytest tests/benchmarks --benchmark-only `
            --benchmark-columns=mean,stddev,ops `
            --benchmark-sort=mean `
            @compareFlags `
            | Tee-Object -FilePath bench-output.txt

      - name: Format benchmark comment
        if: github.event_name == 'pull_request'
        shell: pwsh
        run: |
          $sha = $env:GITHUB_SHA.Substring(0, 7)
          @(
            "### 📊 Benchmark results — ``$sha``"
            ""
            "<details><summary>Click to expand</summary>"
            ""
            '```'
            (Get-Content bench-output.txt -Tail 120 -ErrorAction SilentlyContinue)
            '```'
            ""
            "</details>"
          ) | Out-File -FilePath bench-comment.md -Encoding utf8

      - name: Find prior benchmark comment
        if: github.event_name == 'pull_request'
        id: find-bench
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: "📊 Benchmark results"

      - name: Comment benchmark results on PR
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find-bench.outputs.comment-id }}
          body-path: bench-comment.md
          edit-mode: replace
