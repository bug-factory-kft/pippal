name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write   # find-comment + create-or-update-comment

jobs:
  # ----- Lint -----------------------------------------------------------
  # Cheapest — runs in parallel with the other two so a typo gets
  # reported immediately while the test job is still pulling deps.
  lint:
    name: Lint
    runs-on: pippal-runner
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: python -m pip install --upgrade pip ruff
      - run: ruff check src/pippal tests

  # ----- Unit tests -----------------------------------------------------
  # 140 tests in tests/, benchmarks/ excluded by pytest.ini.
  unit-tests:
    name: Unit tests
    runs-on: pippal-runner
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install xvfb + tk runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libtk8.6
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run unit suite
        id: unit
        # `tee` so we have the output for a possible failure comment
        # while pytest's own exit code still drives the job result.
        run: |
          set -o pipefail
          xvfb-run -a python -m pytest -q | tee unit-output.txt

      # If unit tests failed, post a comment with the summary so the
      # reviewer can see what broke without hunting through the log.
      # Success doesn't get a comment (less noise; the green check is
      # enough).
      - name: Format unit failure comment
        if: failure() && github.event_name == 'pull_request'
        run: |
          {
            echo "### ❌ Unit tests failed — \`${GITHUB_SHA::7}\`"
            echo ""
            echo "<details><summary>pytest output (tail)</summary>"
            echo ""
            echo '```'
            tail -80 unit-output.txt
            echo '```'
            echo ""
            echo "</details>"
          } > unit-comment.md

      - name: Find prior unit comment
        if: failure() && github.event_name == 'pull_request'
        id: find-unit
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: "❌ Unit tests"

      - name: Comment unit failure on PR
        if: failure() && github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find-unit.outputs.comment-id }}
          body-path: unit-comment.md
          edit-mode: replace

  # ----- Benchmarks -----------------------------------------------------
  # 35 microbenchmarks across hotkey / text_utils / voices / plugins / io.
  # Always posts a comment on PRs so reviewers can compare numbers
  # against the baseline they remember from the previous PR.
  benchmarks:
    name: Benchmarks
    runs-on: pippal-runner
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install xvfb + tk runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libtk8.6
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      # If a baseline is committed under `bench-baselines/`, compare
      # against it and fail the job when any benchmark's mean is
      # >30 % slower. The baseline is regenerated by the
      # `Update benchmark baseline` workflow (manual dispatch) when
      # an intentional perf change lands.
      #
      # If no baseline exists in the repo yet, the comparison flags
      # are skipped — we just print the numbers.
      - name: Run benchmarks
        run: |
          set -o pipefail
          BASELINE_FILE=$(find bench-baselines -name '0001_baseline.json' 2>/dev/null | head -1)
          COMPARE_FLAGS=""
          if [ -n "$BASELINE_FILE" ]; then
            echo "Baseline found at $BASELINE_FILE — comparing with mean:30% regression threshold."
            # Pytest-benchmark's `--benchmark-compare` accepts a
            # file path directly, so we pass the absolute baseline
            # JSON. The matching `--benchmark-storage` keeps the
            # current run + comparison rooted in the same dir tree.
            # `min:100%` — fail when the new run's fastest measurement
            # is at least 2× the baseline's fastest. We have ns-scale
            # benchmarks (e.g. ``voice_filename`` clocks in around
            # 60 ns) where even ``min`` rattles 50–70 % between
            # identical runs on a shared k8s node. Anything tighter
            # produces false positives; this still catches a real 2×+
            # regression cleanly.
            COMPARE_FLAGS="--benchmark-storage=file://bench-baselines --benchmark-compare=$(basename $BASELINE_FILE .json | cut -d_ -f1) --benchmark-compare-fail=min:100%"
          else
            echo "No baseline in bench-baselines/. Run the 'Update benchmark baseline' workflow once to seed it."
          fi
          xvfb-run -a python -m pytest tests/benchmarks --benchmark-only \
              --benchmark-columns=mean,stddev,ops \
              --benchmark-sort=mean \
              $COMPARE_FLAGS \
              | tee bench-output.txt

      - name: Format benchmark comment
        if: github.event_name == 'pull_request'
        run: |
          {
            echo "### 📊 Benchmark results — \`${GITHUB_SHA::7}\`"
            echo ""
            echo "<details><summary>Click to expand</summary>"
            echo ""
            echo '```'
            tail -120 bench-output.txt
            echo '```'
            echo ""
            echo "</details>"
          } > bench-comment.md

      - name: Find prior benchmark comment
        if: github.event_name == 'pull_request'
        id: find-bench
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: "📊 Benchmark results"

      - name: Comment benchmark results on PR
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find-bench.outputs.comment-id }}
          body-path: bench-comment.md
          edit-mode: replace
